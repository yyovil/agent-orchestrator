name: PR Diff Coverage

on:
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diff-coverage:
    name: Diff Coverage (80% on changed code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install diff-cover
        run: pip install diff-cover

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Start tmux server
        run: tmux start-server

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@composio/ao-web' build

      - name: Core tests with coverage
        run: pnpm --filter @composio/ao-core exec vitest run --coverage

      - name: CLI tests with coverage
        run: pnpm --filter @composio/ao-cli exec vitest run --coverage

      - name: Web tests with coverage
        run: pnpm --filter @composio/ao-web exec vitest run --coverage

      - name: Prepare lcov reports
        run: |
          mkdir -p combined-coverage
          # Prefix source paths so they match git diff (repo-root-relative)
          sed 's|^SF:|SF:packages/core/|' packages/core/coverage/lcov.info > combined-coverage/core.info
          sed 's|^SF:|SF:packages/cli/|' packages/cli/coverage/lcov.info > combined-coverage/cli.info
          sed 's|^SF:|SF:packages/web/|' packages/web/coverage/lcov.info > combined-coverage/web.info
          cat combined-coverage/core.info combined-coverage/cli.info combined-coverage/web.info > combined-coverage/lcov.info

      - name: Check diff coverage (80% on changed lines)
        run: |
          diff-cover combined-coverage/lcov.info \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=80 \
            --diff-range-notation='...'
